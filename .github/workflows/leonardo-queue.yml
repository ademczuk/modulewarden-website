name: leonardo-queue

# Refreshes the live Leonardo queue dashboard at /leonardo/ for the whole team
# with no one running anything locally. Each run polls the Slurm reservation,
# writes leonardo/queue.json, and deploys the site itself.
#
# It deploys Pages directly instead of committing queue.json, because a commit
# pushed with the default GITHUB_TOKEN does NOT trigger the pages.yml deploy
# workflow (GitHub's loop-prevention). Deploying here is the only path that
# actually reaches the served site. The committed leonardo/queue.json is just a
# seed; live data is the deployed artifact.
#
# Credentials are repo secrets (LEONARDO_USER, LEONARDO_PASSWORD). Data deployed
# is non-sensitive (job ids, usernames, node counts). Scheduled runs can be
# delayed several minutes by GitHub; use the CLI dashboard (--watch) for realtime.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Share the "pages" concurrency group with pages.yml so content deploys and
# queue refreshes serialize instead of racing.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install paramiko
        run: pip install --quiet paramiko

      - name: Poll Leonardo
        env:
          LEONARDO_USER: ${{ secrets.LEONARDO_USER }}
          LEONARDO_PASSWORD: ${{ secrets.LEONARDO_PASSWORD }}
        run: python leonardo/publish_queue.py --out leonardo/queue.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deploy
        uses: actions/deploy-pages@v4
