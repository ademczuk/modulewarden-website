name: leonardo-queue

# Refreshes the live Leonardo queue dashboard at /leonardo/ for the whole team
# with no one running anything locally. Each run polls the Slurm reservation,
# writes leonardo/queue.json, and deploys the site itself.
#
# It both commits the fresh queue.json AND self-deploys Pages. Self-deploy is
# needed because a GITHUB_TOKEN commit does NOT trigger pages.yml (loop-prevention),
# so deploying here is the only path that reaches the served site between content
# pushes. The commit is needed so that when someone DOES push site content (which
# triggers pages.yml to redeploy the whole repo), the committed queue.json is recent
# and not a stale seed that clobbers the live data.
#
# Credentials are repo secrets (LEONARDO_USER, LEONARDO_PASSWORD). Data deployed
# is non-sensitive (job ids, usernames, node counts). Scheduled runs can be
# delayed several minutes by GitHub; use the CLI dashboard (--watch) for realtime.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Share the "pages" concurrency group with pages.yml so content deploys and
# queue refreshes serialize instead of racing.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install paramiko
        run: pip install --quiet paramiko

      - name: Poll Leonardo
        env:
          LEONARDO_USER: ${{ secrets.LEONARDO_USER }}
          LEONARDO_PASSWORD: ${{ secrets.LEONARDO_PASSWORD }}
        run: python leonardo/publish_queue.py --out leonardo/queue.json

      - name: Commit fresh snapshot so content deploys never serve stale data
        run: |
          if ! git diff --quiet -- leonardo/queue.json; then
            git config user.name "leonardo-queue-bot"
            git config user.email "actions@users.noreply.github.com"
            git add leonardo/queue.json
            git commit -m "data: refresh leonardo queue snapshot [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deploy
        uses: actions/deploy-pages@v4
